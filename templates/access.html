{% extends "base.html" %}
{% block content %}

<div class="login-wrapper">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-hex">⬡</div>
      <div class="logo-text">FaultNet 4.0</div>
      <div class="logo-sub" style="text-align:center;margin-top:4px;">Industrial Fault Monitoring System</div>
    </div>

    {% if error %}
    <div class="login-error">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">Access Code</label>
        <input
          type="password"
          name="password"
          class="form-input"
          placeholder="Enter admin password"
          autocomplete="current-password"
          autofocus
        >
      </div>
      <button type="submit" class="btn-submit">⚡ Authenticate</button>
    </form>

    <div style="margin-top:20px;font-family:var(--font-mono);font-size:9px;color:var(--muted);text-align:center;letter-spacing:2px;">
      AUTHORIZED PERSONNEL ONLY
    </div>
  </div>
</div>

{% endblock %}
